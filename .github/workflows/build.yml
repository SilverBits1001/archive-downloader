name: Build pak

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (arm64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build arm64 binary
        run: |
          docker buildx build \
            --platform linux/arm64 \
            --target export \
            -o type=local,dest=out \
            . 2>&1 | tee build.log
        shell: bash

      - name: Show compile errors in summary (on failure)
        if: failure()
        run: |
          echo '## Build failed — compiler output' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          tail -80 build.log >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Publish build log to repo (on failure)
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tail -200 build.log > last-build.log
          B64=$(base64 -w0 last-build.log)
          SHA=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/contents/logs/last-build.log?ref=main" \
            | grep -m1 '"sha"' | sed 's/.*"sha": "//;s/".*//')
          curl -s -X PUT -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/contents/logs/last-build.log" \
            -d "{\"message\":\"build log [skip ci]\",\"content\":\"$B64\"${SHA:+,\"sha\":\"$SHA\"}}" >/dev/null

      - name: Assemble pak
        run: |
          mkdir -p "Archive Downloader.pak"
          cp -r pak/. "Archive Downloader.pak/"
          cp out/archive-downloader "Archive Downloader.pak/"
          chmod +x "Archive Downloader.pak/archive-downloader" "Archive Downloader.pak/launch.sh"
          rm -f "Archive Downloader.pak/config.yml"   # never ship auth

      - name: Upload pak artifact
        uses: actions/upload-artifact@v4
        with:
          name: Archive-Downloader.pak
          path: Archive Downloader.pak
